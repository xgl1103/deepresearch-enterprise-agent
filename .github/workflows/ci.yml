name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests and policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Secret scan
        run: python scripts/secret_scan.py

      - name: Python syntax check for operational scripts
        run: python -m py_compile scripts/secret_scan.py

      - name: Shell script syntax check
        run: bash -n scripts/backup.sh

      - name: PowerShell script syntax check
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/backup.ps1 -Raw), [ref]$errors) | Out-Null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/restore-postgres.ps1 -Raw), [ref]$errors) | Out-Null
          if ($errors) { $errors; exit 1 }

      - name: Docker Compose config check
        run: docker compose --env-file .env.docker.example config --quiet

      - name: Backend pytest
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build
