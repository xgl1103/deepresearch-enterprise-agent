server {
    listen       80;
    server_name  localhost;

    # SPA redirect: /app → /app/
    location = /app {
        return 302 /app/;
    }

    # Frontend static assets (Vite build with base=/app/)
    location /app/ {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri /app/index.html;
    }

    # Proxy all other requests (API + LangGraph SDK) to the backend
    location / {
        proxy_pass          http://backend:2024;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        # SSE / streaming support (LangGraph uses Server-Sent Events)
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  300s;

        # WebSocket support
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
    }

    # Gzip compression for static assets
    gzip             on;
    gzip_types       text/css application/javascript application/json image/svg+xml;
    gzip_proxied     any;
    gzip_min_length  256;
}
